<!DOCTYPE html>
<html>
<head>
    <title>Arduino PC Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; }
        video { width: 95%; max-width: 900px; background: #000; border: 2px solid #3498db; margin-top: 15px; }
        .box { background: #222; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; }
        .share { background: #3498db; color: white; }
        .watch { background: #2ecc71; color: white; }
    </script>
</head>
<body>

    <div class="box">
        <h2>Arduino Screen Bridge</h2>
        <p id="status">Status: Disconnected</p>
        <input type="text" id="room" placeholder="Room Name (e.g. mypc)">
        <br><br>
        <button class="share" onclick="startSharing()">1. START SHARING (PC)</button>
        <br><br>
        <button class="watch" onclick="startWatching()">2. START WATCHING (PHONE)</button>
    </div>

    <br>
    <video id="v" autoplay playsinline muted></video>

<script>
    let peer = null;
    let myStream = null;

    // --- CHROMEBOOK SIDE ---
    async function startSharing() {
        const id = document.getElementById('room').value;
        if(!id) return alert("Enter a room name!");

        try {
            // This MUST happen on HTTPS or Localhost
            myStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('v').srcObject = myStream;
            
            peer = new Peer(id); 
            peer.on('open', () => document.getElementById('status').innerText = "Status: Sharing at " + id);
            
            // Auto-answer anyone who joins
            peer.on('call', (call) => {
                call.answer(myStream);
                document.getElementById('status').innerText = "Status: Connected to Watcher!";
            });
        } catch (e) {
            alert("Error: " + e.message + "\nMake sure you are on HTTPS!");
        }
    }

    // --- PHONE SIDE ---
    function startWatching() {
        const id = document.getElementById('room').value;
        peer = new Peer(); // Random ID for phone
        
        peer.on('open', () => {
            document.getElementById('status').innerText = "Status: Calling Room...";
            // We call the Chromebook with an empty stream to receive theirs
            const call = peer.call(id, new MediaStream()); 
            
            call.on('stream', (remoteStream) => {
                const vid = document.getElementById('v');
                vid.srcObject = remoteStream;
                vid.play(); // Force play
                document.getElementById('status').innerText = "Status: Watching Live!";
            });
        });
    }
</script>
</body>
</html>
