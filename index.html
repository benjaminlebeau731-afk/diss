<!DOCTYPE html>
<html>
<head>
    <title>Easy Screen Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 20px; border: 2px solid #333; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-share { background: #3498db; color: white; }
        .btn-watch { background: #2ecc71; color: white; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; width: 200px; }
        #status { color: #f1c40f; margin-bottom: 20px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Remote Screen View</h1>
    <div id="status">Ready.</div>
    
    <input type="text" id="room-input" placeholder="Enter Room Name">
    <button class="btn btn-share" onclick="startSharing()">Start Sharing</button>
    <button class="btn btn-watch" onclick="joinRoom()">Join Room</button>

    <video id="remote-video" autoplay playsinline></video>
</div>

<script>
    let peer = null;
    let localStream = null;
    const videoElem = document.getElementById('remote-video');
    const status = document.getElementById('status');

    function initPeer(id) {
        if (peer) peer.destroy();
        peer = new Peer(id); // Use the room name as the ID
        
        peer.on('open', () => {
            status.innerText = "Room Active: " + id;
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                status.innerText = "Error: Room is already occupied by a sharer.";
            } else {
                status.innerText = "Error: " + err.type;
            }
        });

        // Answer incoming calls (the watcher)
        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (stream) => {
                videoElem.srcObject = stream;
            });
        });
    }

    async function startSharing() {
        const roomName = document.getElementById('room-input').value;
        if (!roomName) return alert("Please enter a room name!");
        
        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            initPeer(roomName); // The Sharer owns the ID
            videoElem.srcObject = localStream;
            status.innerText = "Sharing screen in room: " + roomName;
        } catch (err) {
            console.error(err);
        }
    }

    function joinRoom() {
        const roomName = document.getElementById('room-input').value;
        if (!roomName) return alert("Please enter a room name!");

        // The watcher doesn't use the room name as their ID (they need a random one)
        peer = new Peer(); 
        peer.on('open', (id) => {
            status.innerText = "Watching Room: " + roomName;
            const call = peer.call(roomName, new MediaStream()); // Call the sharer
            call.on('stream', (stream) => {
                videoElem.srcObject = stream;
            });
        });
    }
</script>
</body>
</html>
